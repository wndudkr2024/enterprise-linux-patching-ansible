---
- name: Capture kernel after patching
  ansible.builtin.command: uname -r
  register: patching_post_patch_kernel
  changed_when: false

- name: Capture uptime after patching
  ansible.builtin.command: uptime
  register: patching_post_patch_uptime
  changed_when: false

- name: Write post-check summary
  ansible.builtin.template:
    src: postcheck-summary.j2
    dest: "{{ patching_log_dir }}/postcheck-{{ inventory_hostname }}.log"
    owner: root
    group: root
    mode: "0644"

- name: Display patch summary
  ansible.builtin.debug:
    msg:
      - "Host: {{ inventory_hostname }}"
      - "Pre-patch kernel: {{ patching_pre_patch_kernel.stdout }}"
      - "Post-patch kernel: {{ patching_post_patch_kernel.stdout }}"
      - "Reboot required rc: {{ reboot_required.rc }}"
