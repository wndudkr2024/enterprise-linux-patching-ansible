---
- name: Apply security updates only
  ansible.builtin.dnf:
    name: "*"
    state: latest
    security: true
    exclude: "{{ patching_excluded_packages }}"
  register: patching_patch_result
  when: patching_security_only | bool

- name: Apply all available updates
  ansible.builtin.dnf:
    name: "*"
    state: latest
    exclude: "{{ patching_excluded_packages }}"
  register: patching_patch_result
  when: not patching_security_only | bool

- name: Check whether reboot is required
  ansible.builtin.command: needs-restarting -r
  register: patching_reboot_required
  failed_when: false
  changed_when: patching_reboot_required.rc == 1

- name: Reboot server when required and allowed
  ansible.builtin.reboot:
    reboot_timeout: "{{ patching_reboot_timeout }}"
    test_command: whoami
  when:
    - patching_reboot_allowed | bool
    - patching_reboot_required.rc == 1
